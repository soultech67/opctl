name: e2e
description: runs all CLI end to end (e2e) tests
inputs:
  githubAccessToken:
    description: accessToken for cloning the private auth test op repo
    string:
      isSecret: true
      constraints:
        minLength: 1
  githubAuthTestOpRef:
    description: private op ref used by auth test scenarios
    string:
      default: github.com/soultech67/test-suite-auth#1.0.0
      constraints:
        minLength: 1
  testsDir:
    dir:
      description: >
        Root directory of conformance tests to iterate. The PR gate passes
        test-suite/auth (fast, reliable); the nightly full run passes the whole
        test-suite (every conformance test, each in its own nested dind).
run:
  serial:
    - op:
        ref: github.com/opspec-pkgs/dir.list-contents#1.1.0
        inputs:
          dir: $(testsDir)
          recursive: true
        outputs:
          contentList: $(tests)
    - serialLoop:
        range: $(tests)
        vars:
          value: $(entry)
        run:
          if:
            - exists: $(testsDir/$(entry.path)/scenarios.json)
          serialLoop:
            range: $(testsDir/$(entry.path)/scenarios.json)
            vars:
              value: $(scenario)
            run:
              if:
                - exists: $(scenario.call)
              name: "op: $(entry.path)"
              serial:
                - name: applyScenarioDefaults
                  op:
                    ref: github.com/opspec-pkgs/object.merge#1.0.0
                    inputs:
                      default:
                        opRef: ''
                        authAddGithub: false
                      override:  $(scenario.call)
                    outputs:
                      result: $(call)
                - name: runScenario
                  container:
                    cmd:
                      - sh
                      - -ce
                      - /cmd.sh
                    dirs:
                      /test: $(testsDir/$(entry.path))
                    envVars:
                      # help differentiate test harness from test output by configuring system under test to not color output
                      OPCTL_NO_COLOR: true
                      opRef: $(call.opRef)
                      op: $(entry.path)
                      expect: $(call.expect)
                      authAddGithub: $(call.authAddGithub)
                      githubAccessToken:
                      githubAuthTestOpRef:
                    files:
                      /args.yml: $(call.scope)
                      /cmd.sh:
                      /usr/local/bin/opctl: $(../../../opctl-linux-amd64)
                    image:
                      ref: docker:27.3.1-dind
