name: test
description: runs all tests
inputs:
  githubAccessToken:
    description: accessToken for cloning the private auth test op repo (only used by the CLI e2e suite; may be empty when runCliE2e is "false")
    string:
      isSecret: true
      default: ""
  runCliE2e:
    description: |
      Whether to run the CLI e2e (docker-in-docker) suite. Defaults to "false"
      because nested docker-in-docker is unreliable on macOS Docker Desktop;
      `make test` sets this to "true" only in CI (CI=true).
    string:
      default: "false"
  githubAuthTestOpRef:
    description: private op ref used by auth test scenarios
    string:
      default: github.com/soultech67/test-suite-auth#1.0.0
      constraints:
        minLength: 1
  dockerSocket:
    socket:
      description: docker socket used as the container runtime for the CLI integration tests
  goBuildCachePath:
    string:
      description: Path relative to HOME dir, to use for go build cache e.g., on macOS, Library/Caches/go-build; on Linux, .cache/go-build
      default: Library/Caches/go-build
  HOME:
    dir:
      description: Home directory of caller; used to access go modules

run:
  parallel:
    # api tests
    - op:
        ref: $(../../api/.opspec/test)
    # CLI tests
    - serial:
        - op:
            ref: $(../../cli/.opspec/test/unit)
            inputs:
              HOME:
        - op:
            ref: $(../../cli/.opspec/test/integration)
            inputs:
              dockerSocket:
              HOME:
        # e2e is docker-in-docker; only run it in CI (set via `make test`).
        # Nested dind inside opctl's macOS WireGuard network is unreliable
        # locally, so it's gated off by default.
        - if:
            - eq: [$(runCliE2e), "true"]
          op:
            ref: $(../../cli/.opspec/test/e2e)
            inputs:
              githubAccessToken:
              githubAuthTestOpRef:
    # opspec tests
    - op:
        ref: $(../../opspec/opfile/.opspec/test)
    # webapp tests
    - op:
        ref: $(../../webapp/.opspec/test)
    # go SDK tests
    - op:
        ref: $(../../sdks/go/.opspec/test)
        inputs:
          HOME:
    # js SDK tests
    - op:
        ref: $(../../sdks/js/.opspec/test)
    # check go fmt has been run
    - container:
        cmd:
          - sh
          - -ce
          - |
            test -z "\$(gofmt -d -l ./cli ./sdks/go | tee /tmp/output)" || (echo "Fix formatting issues with 'opctl run format'" && cat /tmp/output && exit 1)
        dirs:
          /src: $(../..)
          /go/pkg: $(HOME/go/pkg)
          /root/.cache/go-build: $(HOME/$(goBuildCachePath))
        envVars:
          GOFLAGS: -tags=containers_image_openpgp
        image: { ref: "golang:1.25" }
        workDir: /src
