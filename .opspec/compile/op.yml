name: compile
description: runs ops necessary to go from src to releasable artifact(s)
inputs:
  version:
    string:
      constraints:
        format: semver
  selfUpdateRepo:
    string:
      default: soultech67/opctl
      description: GitHub owner/repo used by self-update and update hints to find releases.
  HOME:
    dir:
      description: Home directory of caller; used to access go modules
run:
  serial:
    - op:
        ref: $(../../webapp/.opspec/compile)
    - op:
        ref: $(../../cli/.opspec/compile)
        inputs:
          HOME:
          version:
          selfUpdateRepo:
