name: Build

env:
  OPCTL_BOOTSTRAP_RELEASE_REPO: soultech67/opctl

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-for-changelog:
    name: Check for CHANGELOG.md (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install Opctl
      run: curl -L https://github.com/${OPCTL_BOOTSTRAP_RELEASE_REPO}/releases/latest/download/opctl-linux-amd64.tgz | sudo tar -xzv -C /usr/local/bin
    - name: Check for CHANGELOG.md
      run: opctl run changelog/find-in-diff

  lint-changelog:
    name: lint-changelog
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Install Opctl
        run: curl -L https://github.com/${OPCTL_BOOTSTRAP_RELEASE_REPO}/releases/latest/download/opctl-linux-amd64.tgz | sudo tar -xzv -C /usr/local/bin
      - name: Run Markdownlint
        run: opctl run changelog/lint

  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.ref != 'refs/heads/main'
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Install Opctl
      run: curl -L https://github.com/${OPCTL_BOOTSTRAP_RELEASE_REPO}/releases/latest/download/opctl-linux-amd64.tgz | sudo tar -xzv -C /usr/local/bin
    - name: Compile
      run: opctl run -a version=0.0.0 compile

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.ref != 'refs/heads/main'
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Install Opctl
      run: curl -L https://github.com/${OPCTL_BOOTSTRAP_RELEASE_REPO}/releases/latest/download/opctl-linux-amd64.tgz | sudo tar -xzv -C /usr/local/bin
    # Full suite, including the docker-in-docker CLI e2e (runCliE2e=true).
    - name: Test
      run: opctl run -a githubAccessToken='${{ secrets.TEST_GITHUB_ACCESS_TOKEN }}' -a githubAuthTestOpRef='github.com/soultech67/test-suite-auth#1.0.0' -a runCliE2e=true test

  create-release:
    name: Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint-changelog]
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Install Opctl
      run: curl -L https://github.com/${OPCTL_BOOTSTRAP_RELEASE_REPO}/releases/latest/download/opctl-linux-amd64.tgz | sudo tar -xzv -C /usr/local/bin
    # Capture the version + whether this tag already exists BEFORE the release op
    # creates it, so the Slack step only fires for a genuinely new release (the
    # release op no-ops when the version is already published).
    - name: Resolve release metadata
      id: relmeta
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        version=$(grep -m1 -oE '## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
        echo "version=$version" >> "$GITHUB_OUTPUT"
        if gh release view "v$version" >/dev/null 2>&1; then
          echo "is_new=false" >> "$GITHUB_OUTPUT"
        else
          echo "is_new=true" >> "$GITHUB_OUTPUT"
        fi
    - name: Create release from latest changelog entry
      id: create_release
      run: opctl run -a github='{"username":"${{ github.actor }}","accessToken":"${{ github.token }}"}' release
    - name: Notify Slack of the release
      if: success() && steps.relmeta.outputs.is_new == 'true'
      # The release is already published by the prior step; a Slack hiccup must
      # never fail the release job.
      continue-on-error: true
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ -z "$SLACK_WEBHOOK_URL" ]; then echo "SLACK_WEBHOOK_URL not set; skipping release notification"; exit 0; fi
        version="${{ steps.relmeta.outputs.version }}"
        actor="${{ github.actor }}"
        tag="v${version}"
        release_url="${{ github.server_url }}/${{ github.repository }}/releases/tag/${tag}"
        sha7=$(printf %s "${GITHUB_SHA}" | cut -c1-7)
        # The changelog section for this version IS the release notes; include it, capped.
        notes=$(awk -v v="$version" 'index($0, "## [" v "]")==1 {f=1; next} /^## \[/{f=0} f' CHANGELOG.md)
        if [ "$(printf %s "$notes" | wc -c)" -gt 2500 ]; then
          notes="$(printf %s "$notes" | head -c 2500)$(printf '\n…(truncated — see full release notes)')"
        fi
        header=$(printf ':rocket: *opctl %s released* — <%s|release notes & binaries>\n_pushed by @%s · commit `%s`_' "$tag" "$release_url" "$actor" "$sha7")
        text=$(printf '%s\n\n%s' "$header" "$notes")
        curl -sS -X POST -H 'Content-type: application/json' \
          --data "$(jq -nc --arg t "$text" '{text:$t}')" "$SLACK_WEBHOOK_URL" || echo "slack release post failed (non-fatal)"
